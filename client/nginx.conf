server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # All routes fall back to index.html so React Router handles navigation.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html itself must NOT be cached — it's the entry point that
        # references the fingerprinted bundles, and must always be fresh.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Fingerprinted static assets — long-lived immutable cache ─────────────
    # Vite appends a content hash to every JS/CSS filename (e.g. index-B3kd92.js).
    # Because the filename changes with every build, it is safe to cache forever.
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ── Images & other media — long cache but not immutable ───────────────────
    # SVGs and images may not be fingerprinted (e.g. /public/favicon.svg),
    # so use a long but revalidatable cache instead of immutable.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ── Manifest & service worker — must always be fresh ─────────────────────
    location ~* (manifest\.json|service-worker\.js|sw\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
