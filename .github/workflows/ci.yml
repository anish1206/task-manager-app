name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Server Tests ────────────────────────────────────────────────────────────
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: taskmanager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          node <<'EOF'
          const { Client } = require('pg');

          const connectionString = 'postgresql://test:test@127.0.0.1:5432/taskmanager_test';

          async function waitForDatabase() {
            let lastError;

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const client = new Client({ connectionString, ssl: false });

              try {
                await client.connect();
                await client.query('SELECT 1');
                await client.end();
                return;
              } catch (error) {
                lastError = error;
                await client.end().catch(() => {});
                await new Promise((resolve) => setTimeout(resolve, 1000));
              }
            }

            throw lastError;
          }

          waitForDatabase().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@127.0.0.1:5432/taskmanager_test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 7

  # ── Client Tests ────────────────────────────────────────────────────────────
  client-test:
    name: Client Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          VITE_API_URL: http://localhost:3001

      - name: Build client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-coverage
          path: client/coverage/
          retention-days: 7

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server-test, client-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: task-manager-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: task-manager-client:latest
          build-args: |
            VITE_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose
        run: |
          # Create .env file for docker-compose
          cat > .env << EOF
          NODE_ENV=production
          SERVER_PORT=3001
          CLIENT_PORT=5173
          VITE_API_URL=http://localhost:3001
          JWT_SECRET=test-secret-for-ci
          EOF
          
          docker compose up -d
          sleep 15
          
          # Check if containers are running
          docker compose ps
          
          # Check server health
          curl -f http://localhost:3001/health || exit 1
          
          # Check client
          curl -f http://localhost:5173 || exit 1
          
          docker compose down

  # ── Security Scan ───────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Server)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './server'
          format: 'sarif'
          output: 'trivy-server-results.sarif'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner (Client)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './client'
          format: 'sarif'
          output: 'trivy-client-results.sarif'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-server-results.sarif'

      - name: Upload client Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-client-results.sarif'

  # ── Summary ─────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [server-test, client-test, docker-build, security-scan]
    if: success()
    
    steps:
      - name: Success message
        run: |
          echo "✅ All CI checks passed!"
          echo "- Server tests: PASSED"
          echo "- Client tests: PASSED"
          echo "- Docker build: PASSED"
          echo "- Security scan: PASSED"
